# ============================================================
# AgroLink - application.properties
# Las variables de entorno se configuran en Render Dashboard
# ============================================================

# Server
server.port=${PORT:8080}

# PostgreSQL 
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/agrolink}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT (RNF08 - HMAC-SHA256)
jwt.secret=${JWT_SECRET:AgroLinkSecretKeyMuyLargaParaHS256ConMinimo32Chars!}
jwt.expiration.ms=${JWT_EXPIRATION_MS:86400000}

# CORS
cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200}

# Actuator (health check para Render)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

 
# ============================================================
# Swagger / SpringDoc OpenAPI
# ============================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.filter=true
springdoc.packages-to-scan=com.AgroLink.ProyectoAngular.controller
springdoc.swagger-ui.servers[0].url=${APP_URL:http://localhost:8080}