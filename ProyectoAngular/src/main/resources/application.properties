# ============================================================
# AgroLink - application.properties
# Las variables de entorno se configuran en Render Dashboard
# ============================================================

# Server
server.port=${PORT:8080}

# PostgreSQL 
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/agrolink}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway
# baseline-on-migrate=true porque la BD de producción ya existe (fue creada con
# AgrolinkDB.sql / ddl-auto) y no con Flyway desde el inicio. Al arrancar, Flyway
# marca el esquema actual como version 1 (sin ejecutar nada) y desde ahi aplica
# cualquier script nuevo en db/migration (V2, V3, ...). ddl-auto=update se deja
# activo por ahora para no romper nada existente, pero a futuro los cambios de
# columnas/constraints deberian ir en scripts de Flyway, no depender de ddl-auto.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.locations=classpath:db/migration

# JWT (RNF08 - HMAC-SHA256)
jwt.secret=${JWT_SECRET:AgroLinkSecretKeyMuyLargaParaHS256ConMinimo32Chars!}
jwt.expiration.ms=${JWT_EXPIRATION_MS:86400000}

# CORS
cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200,https://localhost,capacitor://localhost,http://localhost}

# Actuator (health check para Render)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

 
# ============================================================
# Swagger / SpringDoc OpenAPI
# ============================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.filter=true
springdoc.packages-to-scan=com.AgroLink.ProyectoAngular.controller
springdoc.swagger-ui.servers[0].url=${APP_URL:http://localhost:8080}
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.mapper.allow-coercion-of-scalars=true


spring.jackson.mapper.accept-case-insensitive-enums=true