version: '3.9'

services:
  agrolink-db:
    image: postgres:16-alpine
    container_name: agrolink-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agrolink
    ports:
      - "5432:5432"
    volumes:
      - agrolink_pgdata:/var/lib/postgresql/data
      - ./ProyectoAngular/src/main/resources/AgrolinkDB.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agrolink"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  agrolink_pgdata:
    driver: local